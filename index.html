<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafael Santiago | Editor de Vídeo</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #0d0d0d;
    color: #f2f2f2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
  }
  .card { max-width: 560px; }
  h1 { font-size: 2.2rem; margin-bottom: 8px; letter-spacing: -0.02em; }
  p.tag { color: #b8860b; font-size: 1rem; margin-bottom: 32px; }
  .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  a.btn {
    text-decoration: none;
    color: #0d0d0d;
    background: #f2f2f2;
    padding: 12px 24px;
    border-radius: 999px;
    font-weight: 600;
    transition: opacity .2s;
  }
  a.btn:hover { opacity: 0.85; }
  a.btn.alt { background: transparent; color: #f2f2f2; border: 1px solid #444; }
</style>
</head>
<body>
  <div class="card">
    <h1>Rafael Santiago</h1>
    <p class="tag">Edição de vídeo &amp; produção de conteúdo</p>
    <p>Portfólio em construção. Em breve, cases completos de Reels, YouTube, VSLs e testemunhais.</p>
    <div class="links">
      <a class="btn" href="/whatsapp">Falar no WhatsApp</a>
      <a class="btn alt" href="https://instagram.com/eusantiagorafael" target="_blank">Instagram</a>
    </div>
  </div>
</body>
</html>
